<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f2027; }

.page {
  width: 100%;
  background: linear-gradient(180deg, #0f2027 0%, #203a43 40%, #111c22 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 50px 30px 70px;
  text-align: center;
}

/* ===== LOGO SVG ===== */
.logo-wrap {
  margin-bottom: 28px;
  width: 100%;
  max-width: 340px;
}

.logo-wrap svg {
  width: 100%;
  height: auto;
  filter: drop-shadow(0 0 18px rgba(0,229,255,0.45));
}

.hero-desc {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(14px, 3vw, 17px);
  color: rgba(255,255,255,0.6);
  margin-bottom: 32px;
  letter-spacing: 1px;
}

.play-btn {
  display: inline-block;
  padding: 16px 55px;
  background: #00e5ff;
  color: #0a1a22;
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(16px, 3vw, 20px);
  font-weight: 700;
  letter-spacing: 2px;
  text-decoration: none;
  border-radius: 8px;
  transition: all 0.25s ease;
  box-shadow: 0 4px 20px rgba(0,229,255,0.35);
  width: 100%;
  max-width: 380px;
}

.play-btn:hover {
  background: #33ecff;
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,229,255,0.5);
  text-decoration: none;
  color: #0a1a22;
}

.divider {
  width: 80%;
  max-width: 400px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,229,255,0.4), transparent);
  margin: 50px 0;
}

.rules-hint {
  font-family: 'Tajawal', sans-serif;
  font-size: clamp(15px, 3.5vw, 20px);
  font-weight: 700;
  color: rgba(255,255,255,0.8);
  direction: rtl;
  margin-bottom: 14px;
}

.rules-arrow {
  font-size: 28px;
  margin-bottom: 18px;
  display: block;
  animation: bounce 1.1s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(6px); }
}

.rules-btn {
  display: inline-block;
  padding: 15px 50px;
  background: transparent;
  border: 2px solid #00e5ff;
  color: #00e5ff;
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(15px, 3vw, 19px);
  font-weight: 700;
  letter-spacing: 2px;
  text-decoration: none;
  border-radius: 8px;
  transition: all 0.25s ease;
  width: 100%;
  max-width: 380px;
}

.rules-btn:hover {
  background: #00e5ff;
  color: #0a1a22;
  transform: translateY(-3px);
  box-shadow: 0 6px 25px rgba(0,229,255,0.4);
  text-decoration: none;
}

.footer-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  color: rgba(255,255,255,0.2);
  margin-top: 35px;
  letter-spacing: 1px;
}
</style>

<div class="page">

  <div class="logo-wrap">

        <!-- تدرج للإطار -->
        <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00e5ff"/>
          <stop offset="50%" stop-color="#0088aa"/>
          <stop offset="100%" stop-color="#00e5ff"/>
        </linearGradient>
        <!-- تدرج للخلفية الداخلية -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#071820"/>
          <stop offset="100%" stop-color="#0d2a35"/>
        </linearGradient>
        <!-- تدرج نص ACTION -->
        <linearGradient id="actionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#ccf5ff"/>
        </linearGradient>
        <!-- تدرج نص ALMALA3B -->
        <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00e5ff"/>
          <stop offset="50%" stop-color="#33f0ff"/>
          <stop offset="100%" stop-color="#00c8e0"/>
        </linearGradient>
        <!-- فلتر توهج -->
        <filter id="glow">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="glowStrong">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- الإطار الخارجي - شكل مشطوف الزوايا -->
      <polygon points="18,4 322,4 336,18 336,142 322,156 18,156 4,142 4,18"

               stroke-width="2"/>

      <line x1="318" y1="80" x2="336" y2="80" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>

      <!-- نقاط زخرفية في الزوايا -->
      <circle cx="30" cy="30" r="2.5" fill="#00e5ff" opacity="0.7"/>
      <circle cx="310" cy="30" r="2.5" fill="#00e5ff" opacity="0.7"/>
      <circle cx="30" cy="130" r="2.5" fill="#00e5ff" opacity="0.7"/>
      <circle cx="310" cy="130" r="2.5" fill="#00e5ff" opacity="0.7"/>

      <!-- خط فاصل أفقي تحت ACTION -->
      <line x1="60" y1="95" x2="280" y2="95" stroke="url(#borderGrad)" stroke-width="1" opacity="0.5"/>

      <!-- نص ACTION -->
      <text x="170" y="85"
            font-family="Orbitron, sans-serif"
            font-size="52"
            font-weight="900"
            fill="url(#actionGrad)"
            text-anchor="middle"
            filter="url(#glow)"
            letter-spacing="6">ACTION</text>

      <!-- نص ALMALA3B -->
      <text x="170" y="130"
            font-family="Rajdhani, sans-serif"
            font-size="30"
            font-weight="700"
            fill="url(#subGrad)"
            text-anchor="middle"
            filter="url(#glowStrong)"

    </svg>
